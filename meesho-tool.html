<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meesho AI Description Generator | Time Digital India</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; }
        .accent-blue { background-color: #2563eb; }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 py-4 px-6 bg-[#0f172a]/80 backdrop-blur-md border-b border-slate-800">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-blue-500 tracking-tighter">TIME DIGITAL <span class="text-white">INDIA</span></a>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-6 min-h-[80vh] flex flex-col justify-center">
        <div class="glass-card p-8 shadow-2xl border border-slate-700">
            <h1 class="text-3xl font-bold text-center mb-2 text-white">Meesho AI Description</h1>
            <p class="text-slate-400 text-center mb-8 text-sm">Professional description aur tags banayein fast.</p>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold mb-2 text-blue-400">Product Name</label>
                    <input id="productName" type="text" placeholder="e.g. Cotton Kurti Set" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2 text-blue-400">Features (e.g. Color, Fabric, Occasion)</label>
                    <textarea id="features" rows="3" placeholder="e.g. Red, Silk, Party Wear, Mirror Work" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-blue-500 outline-none transition"></textarea>
                </div>

                <button onclick="generateDescription()" class="w-full accent-blue text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition transform active:scale-95 shadow-lg">Magic Se Likho ✨</button>
            </div>

            <div id="resultBox" class="mt-10 hidden border-t border-slate-700 pt-6">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-green-400 font-bold text-sm">Taiyar Hai! ✅</span>
                    <button onclick="copyText()" class="text-xs bg-slate-700 px-3 py-1 rounded-lg hover:bg-slate-600 transition">Copy 📋</button>
                </div>
                <div id="descriptionOutput" class="bg-slate-950 border border-slate-800 p-5 rounded-xl text-sm leading-relaxed text-slate-300 whitespace-pre-wrap"></div>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center border-t border-slate-900 mt-10">
        <p class="text-slate-500 text-sm">© 2026 Time Digital India | Ishwar Meena</p>
    </footer>

    <script>
        function generateDescription() {
            const name = document.getElementById('productName').value;
            const features = document.getElementById('features').value;
            const resultBox = document.getElementById('resultBox');
            const output = document.getElementById('descriptionOutput');

            if(!name || !features) {
                alert("Bhai details toh bhar do!");
                return;
            }

            output.innerText = "AI soch raha hai... ⏳";
            resultBox.classList.remove('hidden');

            // Asli AI Integration yahan hogi, abhi logic dikhane ke liye demo hai:
            setTimeout(() => {
                const featureList = features.split(',').map(f => f.trim());
                const tags = featureList.map(f => "#" + f.replace(/\s+/g, '')).join(' ');
                
                const response = `🌟 *Premium Quality ${name}*\n\nUpgrade your style with this beautiful ${name}. Perfect for every occasion!\n\n✨ *Product Highlights:*\n- Fabric: High Quality\n- Features: ${featureList.join(', ')}\n- Condition: New Arrival\n\n✅ *Why Buy from Us?*\n- Lowest Price on Meesho\n- Fast Delivery\n- Premium Quality Guaranteed\n\nOrder now and be the trendsetter! 🚀\n\n${tags} #MeeshoSeller #TimeDigitalIndia`;
                
                output.innerText = response;
            }, 1200);
        }

        function copyText() {
            const text = document.getElementById('descriptionOutput').innerText;
            navigator.clipboard.writeText(text);
            alert("Description copy ho gaya!");
        }
    </script>
</body>
</html>
