<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meesho AI Description Generator | Time Digital India</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; }
        .accent-blue { background-color: #2563eb; }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 py-4 px-6 bg-[#0f172a]/80 backdrop-blur-md border-b border-slate-800">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-blue-500 tracking-tighter">TIME DIGITAL <span class="text-white">INDIA</span></a>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-6 min-h-[80vh] flex flex-col justify-center">
        <div class="glass-card p-8 shadow-2xl border border-slate-700">
            <h1 class="text-3xl font-bold text-center mb-2 text-white">Meesho AI Description</h1>
            <p class="text-slate-400 text-center mb-8 text-sm">Professional description aur tags banayein fast.</p>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold mb-2 text-blue-400">Product Name</label>
                    <input id="productName" type="text" placeholder="e.g. Cotton Kurti Set" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2 text-blue-400">Features (e.g. Color, Fabric, Occasion)</label>
                    <textarea id="features" rows="3" placeholder="e.g. Red, Silk, Party Wear, Mirror Work" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-blue-500 outline-none transition"></textarea>
                </div>

                <button id="genBtn" onclick="generateDescription()" class="w-full accent-blue text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition transform active:scale-95 shadow-lg">Magic Se Likho ✨</button>
            </div>

            <div id="resultBox" class="mt-10 hidden border-t border-slate-700 pt-6">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-green-400 font-bold text-sm">Taiyar Hai! ✅</span>
                    <button onclick="copyText()" class="text-xs bg-slate-700 px-3 py-1 rounded-lg hover:bg-slate-600 transition text-white">Copy 📋</button>
                </div>
                <div id="descriptionOutput" class="bg-slate-950 border border-slate-800 p-5 rounded-xl text-sm leading-relaxed text-slate-300 whitespace-pre-wrap"></div>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center border-t border-slate-900 mt-10">
        <p class="text-slate-500 text-sm">© 2026 Time Digital India | Managed by Ishwar Meena</p>
    </footer>

    <script>
        async function generateDescription() {
            const name = document.getElementById('productName').value;
            const features = document.getElementById('features').value;
            const resultBox = document.getElementById('resultBox');
            const output = document.getElementById('descriptionOutput');
            const btn = document.getElementById('genBtn');

            // Teri API Key maine yahan daal di hai bhai
            const API_KEY = "AIzaSyDMjqzgViJaYuOnkS7HTVfAtx5TkEaLF20"; 

            if(!name || !features) {
                alert("Bhai details toh bhar do!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "AI Likh Raha Hai... ✨";
            output.innerText = "Thoda intezar karein, Gemini AI kaam kar raha hai...";
            resultBox.classList.remove('hidden');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `Write a high-converting Meesho product description for: ${name}. 
                                Key features: ${features}. 
                                Requirements: Use professional bullet points, attractive emojis, mention 'Best Price' and 'High Quality'. 
                                Include 5 trending hashtags at the end. 
                                Language: Hinglish (Hindi + English mix).`
                            }]
                        }]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                output.innerText = aiText;

            } catch (error) {
                output.innerText = "Error: Kuch dikkat aa gayi bhai. Key check karo ya dobara try karo.";
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerText = "Magic Se Likho ✨";
            }
        }

        function copyText() {
            const text = document.getElementById('descriptionOutput').innerText;
            navigator.clipboard.writeText(text);
            alert("Description copy ho gaya! Ab Meesho par paste kar do.");
        }
    </script>
</body>
</html>
