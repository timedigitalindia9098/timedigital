<div class="relative">
    <input type="text" id="dob" placeholder="DD-MM-YYYY" maxlength="10"
        class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-blue-500 text-center text-lg tracking-widest"
        onkeyup="formatDate(this)">
    <p class="text-xs text-slate-500 mt-2">Example: 15-08-1947 (Type karke daalein)</p>
</div>

<script>
function formatDate(input) {
    let v = input.value.replace(/\D/g, ''); // Sirf numbers rakho
    if (v.length > 2 && v.length <= 4) v = v.slice(0, 2) + '-' + v.slice(2);
    if (v.length > 4) v = v.slice(0, 2) + '-' + v.slice(2, 4) + '-' + v.slice(4, 8);
    input.value = v;
}

// Purane calculateAge function ko bhi thoda badalna hoga kyunki ab hum text le rahe hain
function calculateAge() {
    const dobValue = document.getElementById('dob').value;
    if(!dobValue || dobValue.length < 10) return alert("Bhai, pura date dalo (DD-MM-YYYY)!");
    
    // String ko date mein badalna (DD-MM-YYYY -> YYYY-MM-DD)
    const parts = dobValue.split("-");
    const birthDate = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
    
    const today = new Date();
    if (birthDate > today) return alert("Future ki date? Kya baat hai!");

    let age = today.getFullYear() - birthDate.getFullYear();
    const m = today.getMonth() - birthDate.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) { age--; }
    
    document.getElementById('result').classList.remove('hidden');
    document.getElementById('ageText').innerText = `You are ${age} years old!`;
}
</script>
