<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator | Time Digital India</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: #1e293b; border: 1px solid #334155; border-radius: 1.5rem; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="glass-card w-full max-w-md p-8 shadow-2xl text-center">
        <a href="index.html" class="text-blue-400 hover:text-blue-300 mb-4 inline-block">← Back to Dashboard</a>
        <h1 class="text-3xl font-bold mb-6 text-blue-500">Age Calculator</h1>
        
        <div class="space-y-6">
            <input type="date" id="dob" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-blue-500">
            <button onclick="calculateAge()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all">Calculate Age</button>
            <div id="result" class="hidden mt-6 p-4 bg-slate-900 rounded-xl border border-blue-500/30">
                <p id="ageText" class="text-xl font-bold text-green-400"></p>
            </div>
        </div>
    </div>

    <script>
        function calculateAge() {
            const dob = document.getElementById('dob').value;
            if(!dob) return alert("Date dalo bhai!");
            const birthDate = new Date(dob);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) { age--; }
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('ageText').innerText = `You are ${age} years old!`;
        }
    </script>
</body>
</html>
