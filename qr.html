<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator | Time Digital India</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: #1e293b; border: 1px solid #334155; border-radius: 1.5rem; }
        #qrcode img { margin: 0 auto; border: 10px solid white; border-radius: 0.5rem; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-slate-200">
    <div class="glass-card w-full max-w-md p-8 shadow-2xl text-center">
        <a href="index.html" class="text-blue-400 hover:text-blue-300 mb-4 inline-block transition">← Back to Dashboard</a>
        <h1 class="text-3xl font-bold mb-2 text-blue-500">QR Generator</h1>
        <p class="text-slate-400 mb-8 text-sm">Create instant QR codes for any link or text.</p>

        <div class="space-y-6">
            <input type="text" id="qr-input" placeholder="Paste link or type text here..." 
                class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 outline-none focus:border-blue-500 transition text-white">
            
            <button onclick="generateQR()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all transform hover:scale-[1.02] shadow-lg">
                Generate QR Code
            </button>

            <div id="result-container" class="hidden mt-8 space-y-4 animate-fade-in">
                <div id="qrcode" class="bg-white p-4 rounded-xl inline-block">
                    <img id="qr-img" src="" alt="QR Code">
                </div>
                <button onclick="downloadQR()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition">
                    Download QR (.png)
                </button>
            </div>
        </div>
    </div>

    <script>
        function generateQR() {
            const input = document.getElementById('qr-input').value;
            if (!input) {
                alert("Bhai, kuch likho toh sahi!");
                return;
            }

            const qrImg = document.getElementById('qr-img');
            const container = document.getElementById('result-container');
            
            // Google API for QR Code
            const size = "300x300";
            const url = `https://chart.googleapis.com/chart?cht=qr&chs=${size}&chl=${encodeURIComponent(input)}`;
            
            qrImg.src = url;
            container.classList.remove('hidden');
        }

        function downloadQR() {
            const img = document.getElementById('qr-img');
            fetch(img.src)
                .then(response => response.blob())
                .then(blob => {
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.download = "TimeDigitalIndia_QR.png";
                    link.click();
                });
        }
    </script>
</body>
</html>
