<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator | Time Digital India</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: #1e293b; border: 1px solid #334155; border-radius: 1.5rem; }
        #qrcode canvas, #qrcode img { margin: 0 auto; border: 8px solid white; border-radius: 0.5rem; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-slate-200">
    <div class="glass-card w-full max-w-md p-8 shadow-2xl text-center">
        <a href="index.html" class="text-blue-400 hover:text-blue-300 mb-4 inline-block transition">← Back to Dashboard</a>
        <h1 class="text-3xl font-bold mb-2 text-blue-500">QR Generator</h1>
        <p class="text-slate-400 mb-8 text-sm">Create instant QR codes for any link or text.</p>

        <div class="space-y-6">
            <input type="text" id="qr-input" placeholder="Paste link or type text here..." 
                class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 outline-none focus:border-blue-500 transition text-white">
            
            <button onclick="generateQR()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg">
                Generate QR Code
            </button>

            <div id="result-container" class="hidden mt-8 space-y-4 animate-fade-in">
                <div id="qrcode" class="bg-white p-2 rounded-xl inline-block">
                    </div>
                <button onclick="downloadQR()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition">
                    Download QR (.png)
                </button>
            </div>
        </div>
    </div>

    <script>
        let qrcodeObject = null;

        function generateQR() {
            const input = document.getElementById('qr-input').value;
            if (!input) return alert("Bhai, kuch likho toh sahi!");

            const container = document.getElementById('result-container');
            const qrDiv = document.getElementById('qrcode');
            
            // Purana QR saaf karo
            qrDiv.innerHTML = "";
            container.classList.remove('hidden');

            // Naya QR Generate karo
            qrcodeObject = new QRCode(qrDiv, {
                text: input,
                width: 256,
                height: 256,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function downloadQR() {
            const qrCanvas = document.querySelector('#qrcode canvas');
            const qrImg = document.querySelector('#qrcode img');
            
            // Canvas ya Image dono mein se jo mile use download karo
            const dataUrl = qrCanvas ? qrCanvas.toDataURL("image/png") : qrImg.src;
            
            const link = document.createElement("a");
            link.href = dataUrl;
            link.download = "TimeDigitalIndia_QR.png";
            link.click();
        }
    </script>
</body>
</html>
